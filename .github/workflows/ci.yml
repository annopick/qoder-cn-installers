name: CI

on:
  push:
    branches: [main]

jobs:
  scan:
    name: 扫描与测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: 类型检查
        run: npx tsc --noEmit

      - name: 构建
        run: npm run build

      - name: 测试
        run: npm test
